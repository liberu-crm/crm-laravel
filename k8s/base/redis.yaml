apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-crm-redis
  namespace: liberu-crm
  labels:
    app: liberu-crm
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-crm
      component: redis
  template:
    metadata:
      labels:
        app: liberu-crm
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
        - redis-server
        - --appendonly
        - "yes"
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: liberu-crm-redis
  namespace: liberu-crm
  labels:
    app: liberu-crm
    component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: liberu-crm
    component: redis
