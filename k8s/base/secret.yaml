apiVersion: v1
kind: Secret
metadata:
  name: liberu-crm-secrets
  namespace: liberu-crm
  labels:
    app: liberu-crm
type: Opaque
stringData:
  # IMPORTANT: Replace before deployment. Use external secret management in production.
  # Generate APP_KEY with: php artisan key:generate --show
  APP_KEY: "base64:REPLACE_WITH_ACTUAL_KEY"
  DB_USERNAME: "liberu_crm"
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  DB_ROOT_PASSWORD: "REPLACE_WITH_SECURE_ROOT_PASSWORD"
  REDIS_PASSWORD: ""
  # Social OAuth secrets
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  FACEBOOK_CLIENT_ID: ""
  FACEBOOK_CLIENT_SECRET: ""
  # External integrations
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  MAILCHIMP_API_KEY: ""
