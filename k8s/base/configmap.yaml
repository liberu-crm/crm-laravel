apiVersion: v1
kind: ConfigMap
metadata:
  name: liberu-crm-config
  namespace: liberu-crm
  labels:
    app: liberu-crm
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://crm.example.com"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "info"

  DB_CONNECTION: "mysql"
  DB_HOST: "liberu-crm-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "liberu_crm"

  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  SESSION_LIFETIME: "120"

  REDIS_HOST: "liberu-crm-redis"
  REDIS_PORT: "6379"

  BROADCAST_DRIVER: "reverb"
  FILESYSTEM_DISK: "local"

  OCTANE_SERVER: "roadrunner"
  CONTAINER_MODE: "http"
  WITH_HORIZON: "false"
  WITH_SCHEDULER: "false"
  WITH_REVERB: "false"
