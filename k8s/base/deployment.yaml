apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-crm
  namespace: liberu-crm
  labels:
    app: liberu-crm
    component: application
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: liberu-crm
      component: application
  template:
    metadata:
      labels:
        app: liberu-crm
        component: application
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          until nc -z liberu-crm-mysql 3306; do
            echo "Waiting for MySQL..."; sleep 2
          done
          echo "MySQL is ready!"
      - name: migrations
        image: liberu/crm:latest
        command:
        - sh
        - -c
        - |
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
        envFrom:
        - configMapRef:
            name: liberu-crm-config
        - secretRef:
            name: liberu-crm-secrets
      containers:
      - name: app
        image: liberu/crm:latest
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 6001
          name: rpc
        envFrom:
        - configMapRef:
            name: liberu-crm-config
        - secretRef:
            name: liberu-crm-secrets
        volumeMounts:
        - name: storage
          mountPath: /var/www/html/storage
        - name: cache
          mountPath: /var/www/html/bootstrap/cache
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        livenessProbe:
          exec:
            command:
            - php
            - artisan
            - octane:status
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: liberu-crm-storage
      - name: cache
        emptyDir: {}
      securityContext:
        fsGroup: 1000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-crm-horizon
  namespace: liberu-crm
  labels:
    app: liberu-crm
    component: horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-crm
      component: horizon
  template:
    metadata:
      labels:
        app: liberu-crm
        component: horizon
    spec:
      containers:
      - name: horizon
        image: liberu/crm:latest
        env:
        - name: CONTAINER_MODE
          value: "horizon"
        envFrom:
        - configMapRef:
            name: liberu-crm-config
        - secretRef:
            name: liberu-crm-secrets
        volumeMounts:
        - name: storage
          mountPath: /var/www/html/storage
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: liberu-crm-storage
