apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: liberu-crm-network-policy
  namespace: liberu-crm
  labels:
    app: liberu-crm
spec:
  podSelector:
    matchLabels:
      app: liberu-crm
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - podSelector:
        matchLabels:
          app: liberu-crm
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 6001
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: liberu-crm
          component: database
    ports:
    - protocol: TCP
      port: 3306
  - to:
    - podSelector:
        matchLabels:
          app: liberu-crm
          component: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to:
    - podSelector:
        matchLabels:
          app: liberu-crm
