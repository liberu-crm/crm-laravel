apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- hpa.yaml

namespace: liberu-crm

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: liberu-crm

configMapGenerator:
- name: liberu-crm-config
  behavior: merge
  literals:
  - APP_ENV=production
  - APP_DEBUG=false
  - LOG_LEVEL=warning

images:
- name: liberu/crm
  newTag: latest
